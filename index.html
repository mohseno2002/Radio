<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#eab308">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="راديو مصر">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>راديو مصر والعرب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #eab308;
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --dim: #a1a1aa;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f97316;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:'Cairo',sans-serif;
            background:var(--bg);
            color:#fafafa;
            min-height:100vh;
            padding-bottom:140px;
        }
        .container { max-width:520px; margin:0 auto; padding:16px; }

        header {
            text-align:center;
            padding:24px 0 16px;
            border-bottom:1px solid var(--border);
            margin-bottom:16px;
        }
        header h1 { font-size:1.7rem; font-weight:900; color:var(--primary); }
        header p  { font-size:.72rem; color:var(--dim); margin-top:4px; }

        /* Search */
        .search-wrap { position:relative; margin-bottom:14px; }
        .search-wrap input {
            width:100%; padding:13px 16px 13px 44px;
            background:var(--card); border:1px solid var(--border);
            border-radius:12px; color:#fff;
            font-family:inherit; font-size:.9rem; outline:none; transition:.25s;
        }
        .search-wrap input:focus { border-color:var(--primary); }
        .search-wrap input::placeholder { color:var(--dim); }
        .search-wrap .ico { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--dim); pointer-events:none; }

        /* Tabs */
        .tabs { display:flex; gap:8px; overflow-x:auto; padding-bottom:12px; scrollbar-width:none; }
        .tabs::-webkit-scrollbar { display:none; }
        .tab {
            padding:6px 15px; border-radius:20px; white-space:nowrap;
            background:var(--card); border:1px solid var(--border);
            color:var(--dim); cursor:pointer; font-family:inherit; font-size:.82rem; transition:.2s;
        }
        .tab.active { background:var(--primary); color:#000; font-weight:700; border-color:var(--primary); }

        /* Loading */
        .loading {
            text-align:center; padding:40px 20px; color:var(--dim);
            display:flex; flex-direction:column; align-items:center; gap:12px;
        }
        .spinner {
            width:36px; height:36px; border:3px solid var(--border);
            border-top-color:var(--primary); border-radius:50%;
            animation:spin .8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        .error-msg {
            text-align:center; padding:30px 20px;
            color:var(--red); font-size:.9rem; line-height:1.8;
        }
        .retry-btn {
            margin-top:12px; padding:10px 24px;
            background:var(--primary); color:#000; font-weight:700;
            border:none; border-radius:10px; cursor:pointer; font-family:inherit; font-size:.9rem;
        }

        /* Station cards */
        .stations { display:flex; flex-direction:column; gap:10px; }
        .card {
            background:var(--card); border:1px solid var(--border);
            border-radius:14px; padding:13px 15px;
            display:flex; align-items:center; gap:13px;
            cursor:pointer; transition:.18s;
        }
        .card:hover { border-color:#3f3f46; transform:translateY(-1px); }
        .card.playing { border-color:var(--primary); background:rgba(234,179,8,.06); }

        .card-icon {
            width:48px; height:48px; border-radius:11px;
            background:var(--border); display:flex; align-items:center;
            justify-content:center; font-size:1.4rem; flex-shrink:0;
        }
        .card-info { flex:1; min-width:0; }
        .card-info h3 { font-size:.93rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .card-info p  { font-size:.7rem; color:var(--dim); margin-top:2px; }
        .card-action { flex-shrink:0; color:var(--primary); font-size:1.1rem; opacity:0; }
        .fav-btn { flex-shrink:0; font-size:1.1rem; background:none; border:none; cursor:pointer; padding:0 4px; line-height:1; }
        .fav-btn { flex-shrink:0; font-size:1.1rem; background:none; border:none; cursor:pointer; padding:0 4px; line-height:1; }
        .card.playing .card-action { opacity:1; animation:blink 1.3s infinite; }
        @keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }

        /* Bottom player */
        .player {
            position:fixed; bottom:0; left:0; right:0;
            background:rgba(18,18,20,.97); backdrop-filter:blur(16px);
            border-top:1px solid var(--border);
            padding:13px 18px 28px; display:none; z-index:999;
        }
        .player-inner { max-width:520px; margin:0 auto; display:flex; align-items:center; gap:13px; }
        .p-thumb {
            width:44px; height:44px; border-radius:10px;
            background:var(--border); display:flex; align-items:center;
            justify-content:center; font-size:1.3rem; flex-shrink:0;
        }
        .p-info { flex:1; min-width:0; }
        .p-name { font-size:.88rem; font-weight:700; color:var(--primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .p-status { display:flex; align-items:center; gap:5px; margin-top:3px; }
        .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; transition:.3s; }
        .dot.live    { background:var(--green); box-shadow:0 0 5px var(--green); animation:blink 1.4s infinite; }
        .dot.wait    { background:var(--orange); box-shadow:0 0 5px var(--orange); }
        .dot.err     { background:var(--red); box-shadow:0 0 5px var(--red); }
        .dot.off     { background:#444; }
        .p-status span { font-size:.7rem; color:var(--dim); }

        .waves { display:flex; align-items:flex-end; gap:2px; height:14px; margin-top:4px; }
        .waves b { display:block; width:3px; background:var(--primary); border-radius:2px; animation:wav 1s ease-in-out infinite alternate; }
        .waves b:nth-child(1){animation-delay:.0s}
        .waves b:nth-child(2){animation-delay:.2s}
        .waves b:nth-child(3){animation-delay:.1s}
        .waves b:nth-child(4){animation-delay:.3s}
        @keyframes wav { 0%{height:3px} 100%{height:14px} }
        .waves.off b { animation-play-state:paused; height:3px; opacity:.3; }

        .p-controls { display:flex; align-items:center; gap:11px; flex-shrink:0; }
        input[type=range] { width:72px; accent-color:var(--primary); cursor:pointer; }
        .play-btn {
            width:48px; height:48px; border-radius:50%;
            background:var(--primary); border:none; cursor:pointer;
            font-size:1.1rem; display:flex; align-items:center; justify-content:center;
            transition:transform .13s; box-shadow:0 0 14px rgba(234,179,8,.3);
        }
        .play-btn:active { transform:scale(.91); }

        @media(max-width:400px){ input[type=range]{ display:none; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📻 راديو مصر والعرب</h1>
        <p>محطات مباشرة · Radio Browser</p>
    </header>

    <div class="search-wrap">
        <span class="ico">🔍</span>
        <input id="searchInput" type="text" placeholder="ابحث عن محطة..." oninput="onSearch()">
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="content"><div class="loading"><div class="spinner"></div><span>جاري تحميل المحطات...</span></div></div>
</div>

<div class="player" id="player">
    <div class="player-inner">
        <div class="p-thumb" id="pThumb">📻</div>
        <div class="p-info">
            <div class="p-name" id="pName">—</div>
            <div class="p-status"><div class="dot off" id="dot"></div><span id="pStatus">—</span></div>
            <div class="waves off" id="waves"><b></b><b></b><b></b><b></b></div>
        </div>
        <div class="p-controls">
            <input type="range" min="0" max="1" step="0.05" value="1" oninput="aud.volume=this.value">
            <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        </div>
    </div>
</div>

<audio id="aud"></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>

<script>
// ── Config ──
const CATEGORIES = [
    { label:'مصر',              query:'bycountry/Egypt?limit=100&hidebroken=true&order=votes&reverse=true' },
    { label:'قرآن وإسلاميات',   query:'search?tag=quran&language=arabic&limit=100&hidebroken=true&order=votes&reverse=true' },
    { label:'أخبار',            query:'search?tag=news&language=arabic&limit=100&hidebroken=true&order=votes&reverse=true' },
    { label:'موسيقى عربية',     query:'search?tag=arabic music&language=arabic&limit=100&hidebroken=true&order=votes&reverse=true' },
    { label:'رياضة',            query:'search?tag=sports&limit=100&hidebroken=true&order=votes&reverse=true' },
];
const API = 'https://de1.api.radio-browser.info/json/stations/';

// ── DOM refs ──
const aud      = document.getElementById('aud');
const player   = document.getElementById('player');
const pName    = document.getElementById('pName');
const pThumb   = document.getElementById('pThumb');
const pStatus  = document.getElementById('pStatus');
const dot      = document.getElementById('dot');
const waves    = document.getElementById('waves');
const playBtn  = document.getElementById('playBtn');
const content  = document.getElementById('content');

let allStations = [];
let filtered    = [];
let currentUrl  = '';
let activeCat   = 0;
let retryTimer  = null;
let retryCount  = 0;
const MAX_RETRY = 5;

// ── Favourites ──
function getFavs()       { try { return JSON.parse(localStorage.getItem('favs') || '[]'); } catch(e) { return []; } }
function saveFavs(f)     { localStorage.setItem('favs', JSON.stringify(f)); }
function isFav(url)      { return getFavs().includes(url); }
function toggleFav(url, e) {
    e.stopPropagation();
    let favs = getFavs();
    favs = favs.includes(url) ? favs.filter(x => x !== url) : [...favs, url];
    saveFavs(favs);
    render(filtered);
    if (activeCat === 99) renderFavTab();
}
function renderFavTab() {
    const favUrls     = getFavs();
    const favStations = JSON.parse(localStorage.getItem('favStations') || '[]');
    const list        = favStations.filter(s => favUrls.includes(s.url_resolved));
    allStations = list;
    filtered    = [...list];
    render(filtered);
}

// ── Tabs ──
const tabsEl = document.getElementById('tabs');
function initCats() {
    CATEGORIES.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab' + (i === 0 ? ' active' : '');
        btn.textContent = c.label;
        btn.onclick = () => switchTab(i);
        tabsEl.appendChild(btn);
    });
    // مفضلة
    const favBtn = document.createElement('button');
    favBtn.className = 'tab';
    favBtn.id = 'favTab';
    favBtn.textContent = '❤️ مفضلة';
    favBtn.onclick = () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        favBtn.classList.add('active');
        activeCat = 99;
        document.getElementById('searchInput').value = '';
        renderFavTab();
    };
    tabsEl.appendChild(favBtn);
}

function switchTab(i) {
    document.querySelectorAll('.tab').forEach((b,j) => b.classList.toggle('active', i===j));
    activeCat = i;
    document.getElementById('searchInput').value = '';
    loadStations(i);
}

// ── Fetch ──
async function loadStations(i) {
    content.innerHTML = '<div class="loading"><div class="spinner"></div><span>جاري التحميل...</span></div>';
    const cat = CATEGORIES[i];
    try {
        const url = API + cat.query;
        const res = await fetch(url, { headers:{ 'User-Agent':'RadioApp/2.0' } });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        allStations = data.filter(s => s.url_resolved);

        // محطات يدوية
        const MANUAL = {
            2: [
                { name:'الجزيرة عربي',   url_resolved:'https://live-hls-v3-aja.getaj.net/AJA/v3/index.m3u8',      favicon:'', tags:'news,arabic',   country:'Qatar' },
                { name:'الجزيرة مباشر',  url_resolved:'https://live-hls-web-ajm.getaj.net/AJM/index.m3u8',        favicon:'', tags:'news,arabic',   country:'Qatar' },
                { name:'RT Arabic',      url_resolved:'https://rt-arabicgo.rttv.com/live/rtarabic/playlist.m3u8',  favicon:'', tags:'news,arabic',   country:'Russia' },
            ],
            4: [
                { name:'ON Sport FM 93.7', url_resolved:'https://stream.zeno.fm/onsportfm',           favicon:'', tags:'sports,egypt',  country:'Egypt' },
                { name:'beIN Sports Radio',url_resolved:'https://stream.zeno.fm/radio-bein-sport',    favicon:'', tags:'sports,arabic', country:'Qatar' },
                { name:'راديو الأهلي',     url_resolved:'https://stream.zeno.fm/ahlyradio',           favicon:'', tags:'sports,egypt',  country:'Egypt' },
            ],
        };
        const manualList = MANUAL[i] || [];
        if (manualList.length) {
            const urls = allStations.map(s => s.url_resolved);
            manualList.forEach(e => { if (!urls.includes(e.url_resolved)) allStations.unshift(e); });
        }

        filtered = [...allStations];
        render(filtered);
    } catch(e) {
        content.innerHTML = `
            <div class="error-msg">
                ⚠️ تعذّر تحميل المحطات<br>
                <small style="color:var(--dim)">${e.message}</small><br>
                <button class="retry-btn" onclick="loadStations(${i})">إعادة المحاولة</button>
            </div>`;
    }
}

// ── Render ──
function render(list) {
    if (!list.length) {
        content.innerHTML = '<div class="loading"><span>' + (activeCat === 99 ? 'لا توجد محطات مفضلة بعد' : 'لا توجد نتائج') + '</span></div>';
        return;
    }
    content.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'stations';
    list.forEach(s => {
        const isPlay = currentUrl === s.url_resolved;
        const div = document.createElement('div');
        div.className = 'card' + (isPlay ? ' playing' : '');
        const icon = s.favicon
            ? `<img src="${s.favicon}" width="28" height="28" style="border-radius:5px;object-fit:cover" onerror="this.replaceWith(document.createTextNode('📻'))">`
            : '📻';
        const favIcon = isFav(s.url_resolved) ? '❤️' : '🤍';
        div.innerHTML = `
            <div class="card-icon">${icon}</div>
            <div class="card-info">
                <h3>${s.name.trim()}</h3>
                <p>${s.country || ''} ${s.tags ? '· ' + s.tags.split(',').slice(0,2).join(', ') : ''}</p>
            </div>
            <button class="fav-btn" onclick="toggleFav('${s.url_resolved}', event)">${favIcon}</button>
            <div class="card-action">🔊</div>
        `;
        div.onclick = () => playStation(s);
        grid.appendChild(div);
    });
    content.appendChild(grid);
}

// ── Search ──
function onSearch() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    filtered = q ? allStations.filter(s => s.name.toLowerCase().includes(q) || (s.tags||'').includes(q)) : [...allStations];
    render(filtered);
}

// ── Playback ──
let hlsInstance = null;

function loadAudio(url) {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    const isHls = url.includes('.m3u8');
    if (isHls && Hls.isSupported()) {
        hlsInstance = new Hls({ lowLatencyMode: true });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(aud);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => aud.play().catch(() => {}));
        hlsInstance.on(Hls.Events.ERROR, (_, data) => { if (data.fatal) aud.dispatchEvent(new Event('error')); });
    } else {
        aud.src = url;
        aud.load();
        aud.play().catch(() => {});
    }
}

function playStation(s) {
    if (currentUrl === s.url_resolved) { togglePlay(); return; }
    clearTimeout(retryTimer);
    retryCount = 0;
    currentUrl = s.url_resolved;

    // save for favs & last played
    let saved = JSON.parse(localStorage.getItem('favStations') || '[]');
    if (!saved.find(x => x.url_resolved === s.url_resolved)) {
        saved.push(s); localStorage.setItem('favStations', JSON.stringify(saved));
    }
    localStorage.setItem('lastStation', JSON.stringify(s));

    player.style.display = 'block';
    pName.textContent  = s.name.trim();
    pThumb.innerHTML   = s.favicon
        ? `<img src="${s.favicon}" width="32" height="32" style="border-radius:7px;object-fit:cover" onerror="this.replaceWith(document.createTextNode('📻'))">`
        : '📻';
    playBtn.textContent = '⏸';
    waves.classList.remove('off');
    setDot('wait', 'جاري التحميل...');
    loadAudio(currentUrl);
    render(filtered);
}

function togglePlay() {
    if (!currentUrl) return;
    if (aud.paused) {
        aud.play().catch(() => {});
        playBtn.textContent = '⏸';
        waves.classList.remove('off');
    } else {
        aud.pause();
        playBtn.textContent = '▶';
        waves.classList.add('off');
        setDot('off', 'متوقف');
    }
}

function setDot(state, text) {
    dot.className = 'dot ' + state;
    pStatus.textContent = text;
}

// ── Audio events ──
aud.addEventListener('playing', () => {
    clearTimeout(retryTimer); retryCount = 0;
    setDot('live', 'بث مباشر');
    waves.classList.remove('off');
    playBtn.textContent = '⏸';
});
aud.addEventListener('waiting', () => { if(currentUrl) setDot('wait','جاري التحميل...'); });
aud.addEventListener('error', () => {
    if (!currentUrl) return;
    if (retryCount >= MAX_RETRY) { setDot('err','⚠️ تعذّر الاتصال'); waves.classList.add('off'); return; }
    retryCount++;
    setDot('wait', `إعادة الاتصال (${retryCount}/${MAX_RETRY})...`);
    retryTimer = setTimeout(() => { if(currentUrl) loadAudio(currentUrl); }, retryCount * 3000);
});

// ── Init ──
initCats();
loadStations(0);

// استعادة آخر محطة
try {
    const last = JSON.parse(localStorage.getItem('lastStation'));
    if (last && last.url_resolved) setTimeout(() => playStation(last), 1000);
} catch(e) {}
</script>
<style>
.update-bar {
    position: fixed; top: 0; left: 0; right: 0;
    background: #eab308; color: #000;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'Cairo', sans-serif; font-size: .88rem; font-weight: 700;
    z-index: 9999; transform: translateY(-100%);
    transition: transform .35s ease;
}
.update-bar.show { transform: translateY(0); }
.update-bar button {
    background: #000; color: #eab308;
    border: none; border-radius: 8px;
    padding: 6px 14px; cursor: pointer;
    font-family: inherit; font-weight: 700; font-size: .82rem;
}
</style>
<div class="update-bar" id="updateBar">
    <span>🔄 يوجد تحديث جديد</span>
    <button onclick="location.reload()">تحديث الآن</button>
</div>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
        .then(reg => {
            console.log('SW registered');
            // لو في worker جديد جاهز
            reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        document.getElementById('updateBar').classList.add('show');
                    }
                });
            });
        })
        .catch(e => console.log('SW error', e));

    // رسالة من SW بعد activate
    navigator.serviceWorker.addEventListener('message', e => {
        if (e.data && e.data.type === 'SW_UPDATED') {
            document.getElementById('updateBar').classList.add('show');
        }
    });
}
</script>
</body>
</html>
